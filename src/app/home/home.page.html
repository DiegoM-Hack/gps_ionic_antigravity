<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Ionic GPS</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding ion-text-center">
  <h2>Mi Ubicación Actual</h2>
  
  <div *ngIf="coords">
    <p><b>Latitud:</b> {{ coords.latitude }}</p>
    <p><b>Longitud:</b> {{ coords.longitude }}</p>
  </div>

  <ion-button expand="block" (click)="obtenerUbicacion()">
    Mostrar Coordenadas
  </ion-button>
</ion-content>
